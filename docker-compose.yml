services:
  postgres-db:
    image: postgres:15-alpine
    container_name: gymapp_local_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: gymapp_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d gymapp_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: gymapp_backend
    ports:
      - "3001:3001"
    volumes:
      - ./backend/uploads:/app/uploads
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql://admin:password@postgres-db:5432/gymapp_db?schema=public
    depends_on:
      postgres-db:
        condition: service_healthy
    command: sh -c "npx prisma db push --accept-data-loss && npx prisma db seed && npx tsx server.ts"

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=/api
    container_name: gymapp_frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  pgdata:
